{% extends "base.html" %}

{% block title %}Add Expense{% endblock %}

{% block content %}
<section class="page-header">
    <h1>Add Expense</h1>
    <p class="subtitle">Record a new personal expense</p>
</section>

<section class="card form-card">
    <form method="post" action="{{ url_for('add_expense') }}" class="expense-form" novalidate>
        <div class="form-group">
            <label for="title">Title <span class="required">*</span></label>
            <input type="text" id="title" name="title" value="{{ form_data.title }}" required maxlength="200" placeholder="e.g. Coffee at Starbucks">
        </div>

        <div class="form-group">
            <label for="amount">Amount <span class="required">*</span></label>
            <input type="number" id="amount" name="amount" value="{{ form_data.amount }}" required min="0.01" step="0.01" placeholder="0.00">
        </div>

        <div class="form-group">
            <label for="category">Category <span class="required">*</span></label>
            <select id="category" name="category" required>
                <option value="" disabled {% if not form_data.category %}selected{% endif %}>Select a category</option>
                {% for category in categories %}
                <option value="{{ category }}" {% if form_data.category == category %}selected{% endif %}>{{ category }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="date">Date <span class="required">*</span></label>
            <input type="date" id="date" name="date" value="{{ form_data.date }}" required max="{{ today }}">
        </div>

        <div class="form-group">
            <label for="note">Note</label>
            <textarea id="note" name="note" rows="4" maxlength="1000" placeholder="Optional details">{{ form_data.note }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Expense</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
